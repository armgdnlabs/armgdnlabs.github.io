<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARMGDN // Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@300..600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a08;--s1:#141410;--s2:#1a1a15;--s3:#222219;
      --border:rgba(255,255,200,0.06);--div:rgba(255,255,200,0.03);
      --text:#c8c5a8;--muted:#6a6855;--faint:#35332a;--inv:#0a0a08;
      --green:#7fff5f;--green-d:rgba(127,255,95,0.08);--green-b:rgba(127,255,95,0.35);
      --mono:'Share Tech Mono','Courier New',monospace;
      --body:'Space Grotesk','Helvetica Neue',sans-serif;
      --trans:160ms cubic-bezier(0.16,1,0.3,1);
    }
    [data-theme="light"]{
      --bg:#f0ede3;--s1:#ede9dc;--s2:#e6e2d4;--s3:#ddd8c8;
      --border:rgba(30,28,10,0.08);--div:rgba(30,28,10,0.04);
      --text:#1c1b0f;--muted:#5c5a46;--faint:#a8a48a;--inv:#f0ede3;
      --green:#1a6e10;--green-d:rgba(26,110,16,0.07);--green-b:rgba(26,110,16,0.28);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
    body{min-height:100dvh;font-family:var(--body);font-size:0.9rem;color:var(--text);background:var(--bg);line-height:1.6;}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    input,textarea,select{font:inherit;color:inherit;}
    a{color:inherit;text-decoration:none;}
    :focus-visible{outline:1px solid var(--green);outline-offset:2px;}

    /* LOGIN */
    #login-screen{
      position:fixed;inset:0;z-index:999;
      background:var(--bg);
      display:flex;align-items:center;justify-content:center;
    }
    .login-box{
      background:var(--s2);border:1px solid var(--green-b);
      border-radius:12px;padding:2rem;
      width:320px;display:flex;flex-direction:column;gap:1rem;
      box-shadow:0 0 60px rgba(127,255,95,0.06);
    }
    .login-box h1{font-family:var(--mono);font-size:0.8rem;color:var(--green);letter-spacing:0.2em;}
    .login-sub{font-family:var(--mono);font-size:0.65rem;color:var(--faint);letter-spacing:0.15em;}
    .field{display:flex;flex-direction:column;gap:0.35rem;}
    .field label{font-family:var(--mono);font-size:0.65rem;color:var(--faint);letter-spacing:0.15em;}
    .inp{
      background:var(--s1);border:1px solid var(--border);
      border-radius:4px;padding:0.6rem 0.75rem;
      font-family:var(--mono);font-size:0.8rem;color:var(--text);width:100%;
      transition:border-color var(--trans);
    }
    .inp:focus{outline:none;border-color:var(--green-b);}
    .btn-login{
      background:var(--green);color:var(--inv);
      border:1px solid var(--green);border-radius:4px;
      padding:0.6rem;font-family:var(--mono);font-size:0.75rem;
      letter-spacing:0.1em;cursor:pointer;
      transition:opacity var(--trans);
    }
    .btn-login:hover{opacity:0.85;}
    .login-err{font-family:var(--mono);font-size:0.65rem;color:rgba(255,80,80,0.8);display:none;letter-spacing:0.1em;}
    .login-err.show{display:block;}

    /* DASHBOARD */
    #dashboard{display:none;}
    #dashboard.show{display:flex;flex-direction:column;min-height:100dvh;}
    .dash-header{
      position:sticky;top:0;z-index:50;
      background:color-mix(in oklch,var(--bg) 85%,transparent);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding:0.6rem 1.5rem;
      display:flex;align-items:center;gap:1rem;
    }
    .dash-logo{font-family:var(--mono);font-size:0.75rem;letter-spacing:0.25em;color:var(--green);}
    .dash-badge{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.15em;color:var(--faint);border:1px solid var(--border);padding:1px 6px;border-radius:2px;}
    .dash-logout{margin-left:auto;font-family:var(--mono);font-size:0.65rem;color:rgba(255,100,100,0.7);border:1px solid rgba(255,80,80,0.2);padding:0.25rem 0.6rem;border-radius:3px;transition:all var(--trans);}
    .dash-logout:hover{background:rgba(255,80,80,0.08);}
    .dash-body{display:flex;flex:1;min-height:0;}
    .dash-sidebar{
      width:180px;flex-shrink:0;
      border-right:1px solid var(--border);
      padding:1rem 0;
      display:flex;flex-direction:column;gap:0.25rem;
    }
    .tab-btn{
      display:flex;align-items:center;gap:0.5rem;
      padding:0.5rem 1rem;
      font-family:var(--mono);font-size:0.7rem;letter-spacing:0.1em;
      color:var(--muted);background:transparent;
      border:none;cursor:pointer;text-align:left;
      transition:color var(--trans),background var(--trans);
      border-left:2px solid transparent;
    }
    .tab-btn:hover{color:var(--text);background:var(--green-d);}
    .tab-btn.active{color:var(--green);border-left-color:var(--green);background:var(--green-d);}
    .dash-main{flex:1;overflow-y:auto;padding:1.5rem;}
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}
    .panel-title{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.2em;color:var(--faint);margin-bottom:1.25rem;}

    /* FORM ELEMENTS */
    .form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(280px,100%),1fr));gap:1rem;margin-bottom:1.5rem;}
    .form-field{display:flex;flex-direction:column;gap:0.35rem;}
    .form-field label{font-family:var(--mono);font-size:0.65rem;color:var(--faint);letter-spacing:0.12em;}
    .form-inp{
      background:var(--s1);border:1px solid var(--border);
      border-radius:4px;padding:0.5rem 0.75rem;
      font-family:var(--mono);font-size:0.78rem;color:var(--text);
      transition:border-color var(--trans);width:100%;
    }
    .form-inp:focus{outline:none;border-color:var(--green-b);}
    textarea.form-inp{min-height:80px;resize:vertical;line-height:1.5;}
    .form-actions{display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:0.5rem;}
    .btn-save{
      background:var(--green);color:var(--inv);
      border:1px solid var(--green);border-radius:4px;
      padding:0.45rem 1rem;font-family:var(--mono);font-size:0.7rem;
      letter-spacing:0.1em;cursor:pointer;transition:opacity var(--trans);
    }
    .btn-save:hover{opacity:0.85;}
    .btn-add{
      background:transparent;color:var(--green);
      border:1px solid var(--green-b);border-radius:4px;
      padding:0.45rem 1rem;font-family:var(--mono);font-size:0.7rem;
      letter-spacing:0.1em;cursor:pointer;transition:all var(--trans);
    }
    .btn-add:hover{background:var(--green-d);}
    .btn-del{
      background:transparent;color:rgba(255,100,100,0.6);
      border:1px solid rgba(255,80,80,0.2);border-radius:4px;
      padding:0.3rem 0.6rem;font-family:var(--mono);font-size:0.65rem;
      cursor:pointer;transition:all var(--trans);
    }
    .btn-del:hover{background:rgba(255,80,80,0.08);}
    .save-note{font-family:var(--mono);font-size:0.65rem;color:var(--green);display:none;letter-spacing:0.1em;}
    .save-note.show{display:inline;}

    /* ITEM CARDS */
    .item-list{display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1.25rem;}
    .item-card{
      background:var(--s1);border:1px solid var(--border);border-radius:8px;
      padding:1rem;display:flex;flex-direction:column;gap:0.75rem;
    }
    .item-card-header{display:flex;align-items:center;gap:0.5rem;}
    .item-card-title{font-family:var(--mono);font-size:0.75rem;color:var(--text);flex:1;}
    .item-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(200px,100%),1fr));gap:0.5rem;}
    .divider{height:1px;background:var(--border);margin:1rem 0;}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>ARMGDN // ADMIN</h1>
    <p class="login-sub">// SYSTEM ACCESS TERMINAL</p>
    <div class="field">
      <label>USERNAME</label>
      <input class="inp" id="l-user" type="text" autocomplete="username" placeholder="armgdn"/>
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input class="inp" id="l-pass" type="password" autocomplete="current-password" placeholder="••••••••"/>
    </div>
    <p class="login-err" id="l-err">// ACCESS DENIED</p>
    <button class="btn-login" id="l-btn">INITIALIZE SESSION</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header class="dash-header">
    <span class="dash-logo">ARMGDN</span>
    <span class="dash-badge">ADMIN</span>
    <button class="dash-logout" id="d-logout">EXIT SESSION</button>
  </header>
  <div class="dash-body">
    <nav class="dash-sidebar" aria-label="Admin sections">
      <button class="tab-btn active" data-tab="site">// SITE COPY</button>
      <button class="tab-btn" data-tab="tools">// TOOLS</button>
      <button class="tab-btn" data-tab="artists">// ARTISTS</button>
      <button class="tab-btn" data-tab="projects">// PROJECTS</button>
    </nav>
    <main class="dash-main">

      <!-- SITE COPY -->
      <div class="tab-panel active" id="tab-site">
        <p class="panel-title">// SITE COPY &amp; TEXT</p>
        <div class="form-grid">
          <div class="form-field" style="grid-column:1/-1">
            <label>HERO HEADING</label>
            <input class="form-inp" id="c-hero-h" type="text"/>
          </div>
          <div class="form-field" style="grid-column:1/-1">
            <label>HERO BODY</label>
            <textarea class="form-inp" id="c-hero-b"></textarea>
          </div>
          <div class="form-field" style="grid-column:1/-1">
            <label>ABOUT TEXT</label>
            <textarea class="form-inp" id="c-about"></textarea>
          </div>
          <div class="form-field">
            <label>LABS CARD BODY</label>
            <textarea class="form-inp" id="c-labs"></textarea>
          </div>
          <div class="form-field">
            <label>RECORDS CARD BODY</label>
            <textarea class="form-inp" id="c-records"></textarea>
          </div>
          <div class="form-field">
            <label>STUDIOS CARD BODY</label>
            <textarea class="form-inp" id="c-studios"></textarea>
          </div>
          <div class="form-field" style="grid-column:1/-1">
            <label>FOOTER SLOGAN</label>
            <input class="form-inp" id="c-footer"/>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-save" id="site-save">SAVE SITE COPY</button>
          <span class="save-note" id="site-note">// SAVED</span>
        </div>
      </div>

      <!-- TOOLS -->
      <div class="tab-panel" id="tab-tools">
        <p class="panel-title">// LABS TOOLS</p>
        <div class="item-list" id="tools-list"></div>
        <button class="btn-add" id="tool-add">+ ADD TOOL</button>
        <div class="form-actions" style="margin-top:1rem;">
          <button class="btn-save" id="tools-save">SAVE TOOLS</button>
          <span class="save-note" id="tools-note">// SAVED</span>
        </div>
      </div>

      <!-- ARTISTS -->
      <div class="tab-panel" id="tab-artists">
        <p class="panel-title">// RECORD LABEL ARTISTS</p>
        <div class="item-list" id="artists-list"></div>
        <button class="btn-add" id="artist-add">+ ADD ARTIST</button>
        <div class="form-actions" style="margin-top:1rem;">
          <button class="btn-save" id="artists-save">SAVE ARTISTS</button>
          <span class="save-note" id="artists-note">// SAVED</span>
        </div>
      </div>

      <!-- PROJECTS -->
      <div class="tab-panel" id="tab-projects">
        <p class="panel-title">// STUDIO PROJECTS</p>
        <div class="item-list" id="projects-list"></div>
        <button class="btn-add" id="project-add">+ ADD PROJECT</button>
        <div class="form-actions" style="margin-top:1rem;">
          <button class="btn-save" id="projects-save">SAVE PROJECTS</button>
          <span class="save-note" id="projects-note">// SAVED</span>
        </div>
      </div>

    </main>
  </div>
</div>

<script>
(function(){
  var U='armgdn', P='labs2026';
  var ls = (function(){
    try{ return window.localStorage; }catch(e){ return null; }
  })();
  function lsGet(k){ try{ return ls ? ls.getItem(k) : null; }catch(e){ return null; } }
  function lsSet(k,v){ try{ if(ls) ls.setItem(k,v); }catch(e){} }

  // apply saved theme
  var t = lsGet('armgdn-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);

  // ── LOGIN ──
  var loginScreen = document.getElementById('login-screen');
  var dashboard   = document.getElementById('dashboard');
  var lUser = document.getElementById('l-user');
  var lPass = document.getElementById('l-pass');
  var lErr  = document.getElementById('l-err');
  var lBtn  = document.getElementById('l-btn');

  function doLogin(){
    if(lUser.value.trim()===U && lPass.value===P){
      loginScreen.style.display='none';
      dashboard.classList.add('show');
      loadAll();
    } else {
      lErr.classList.add('show');
      lPass.value='';
      setTimeout(function(){ lErr.classList.remove('show'); },2000);
    }
  }
  lBtn.addEventListener('click', doLogin);
  lPass.addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });

  document.getElementById('d-logout').addEventListener('click',function(){
    dashboard.classList.remove('show');
    loginScreen.style.display='flex';
    lUser.value=''; lPass.value='';
  });

  // ── TABS ──
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    });
  });

  // ── SITE COPY ──
  var copyKeys = {
    'c-hero-h':  'armgdn-c-hero-h',
    'c-hero-b':  'armgdn-c-hero-b',
    'c-about':   'armgdn-c-about',
    'c-labs':    'armgdn-c-labs',
    'c-records': 'armgdn-c-records',
    'c-studios': 'armgdn-c-studios',
    'c-footer':  'armgdn-c-footer'
  };
  function loadSiteCopy(){
    Object.keys(copyKeys).forEach(function(id){
      var el=document.getElementById(id);
      var val=lsGet(copyKeys[id]);
      if(el && val!==null) el.value=val;
    });
  }
  document.getElementById('site-save').addEventListener('click',function(){
    Object.keys(copyKeys).forEach(function(id){
      var el=document.getElementById(id);
      if(el) lsSet(copyKeys[id], el.value);
    });
    flash('site-note');
  });

  // ── TOOLS ──
  var tools=[];
  function defaultTools(){
    return [
      {name:'Pocket Radio FM',tag:'Radio',url:'https://pocket-radio-fm.lovable.app',status:'live',desc:''},
      {name:'Kit Foundry',tag:'Sampler',url:'https://kit-foundry.lovable.app',status:'dev',desc:''},
      {name:'Chord Codes 101',tag:'Theory',url:'https://chord-codes-101.lovable.app',status:'dev',desc:''}
    ];
  }
  function loadTools(){
    var raw=lsGet('armgdn-tools');
    tools = raw ? JSON.parse(raw) : defaultTools();
    renderTools();
  }
  function renderTools(){
    var list=document.getElementById('tools-list');
    list.innerHTML='';
    tools.forEach(function(tool,i){
      var card=document.createElement('div');
      card.className='item-card';
      card.innerHTML=
        '<div class="item-card-header">'+
          '<span class="item-card-title">TOOL '+(i+1)+'</span>'+
          '<button class="btn-del" data-idx="'+i+'">REMOVE</button>'+
        '</div>'+
        '<div class="item-card-grid">'+
          field('Name','tool-name-'+i,tool.name,'text')+
          field('Tag','tool-tag-'+i,tool.tag,'text')+
          field('URL','tool-url-'+i,tool.url,'text')+
          fieldSel('Status','tool-status-'+i,tool.status,['live','dev','tba'])+
        '</div>'+
        '<div class="form-field"><label>DESCRIPTION</label><textarea class="form-inp" id="tool-desc-'+i+'">'+esc(tool.desc||'')+'</textarea></div>';
      card.querySelector('.btn-del').addEventListener('click',function(e){
        tools.splice(+e.target.dataset.idx,1); renderTools();
      });
      list.appendChild(card);
    });
  }
  document.getElementById('tool-add').addEventListener('click',function(){
    tools.push({name:'New Tool',tag:'',url:'',status:'dev',desc:''});
    renderTools();
  });
  document.getElementById('tools-save').addEventListener('click',function(){
    tools = tools.map(function(_,i){
      return {
        name: val('tool-name-'+i),
        tag:  val('tool-tag-'+i),
        url:  val('tool-url-'+i),
        status: val('tool-status-'+i),
        desc: val('tool-desc-'+i)
      };
    });
    lsSet('armgdn-tools', JSON.stringify(tools));
    flash('tools-note');
  });

  // ── ARTISTS ──
  var artists=[];
  function defaultArtists(){ return []; }
  function loadArtists(){
    var raw=lsGet('armgdn-artists');
    artists = raw ? JSON.parse(raw) : defaultArtists();
    renderArtists();
  }
  function renderArtists(){
    var list=document.getElementById('artists-list');
    list.innerHTML='';
    artists.forEach(function(a,i){
      var card=document.createElement('div');
      card.className='item-card';
      card.innerHTML=
        '<div class="item-card-header">'+
          '<span class="item-card-title">'+(a.name||'ARTIST '+(i+1))+'</span>'+
          '<button class="btn-del" data-idx="'+i+'">REMOVE</button>'+
        '</div>'+
        '<div class="item-card-grid">'+
          field('Artist / Persona','a-name-'+i,a.name||'','text')+
          field('Genre Tags','a-genre-'+i,a.genre||'','text')+
          fieldSel('Release Type','a-type-'+i,a.type||'Artist',['Artist','EP','Single','Album','Mixtape','Persona'])+
          field('Link','a-link-'+i,a.link||'','text')+
          field('Media URL','a-media-'+i,a.media||'','text')+
        '</div>'+
        '<div class="form-field"><label>DESCRIPTION</label><textarea class="form-inp" id="a-desc-'+i+'">'+esc(a.desc||'')+'</textarea></div>';
      card.querySelector('.btn-del').addEventListener('click',function(e){
        artists.splice(+e.target.dataset.idx,1); renderArtists();
      });
      list.appendChild(card);
    });
  }
  document.getElementById('artist-add').addEventListener('click',function(){
    artists.push({name:'',genre:'',type:'Artist',link:'',media:'',desc:''});
    renderArtists();
  });
  document.getElementById('artists-save').addEventListener('click',function(){
    artists = artists.map(function(_,i){
      return {
        name:  val('a-name-'+i),
        genre: val('a-genre-'+i),
        type:  val('a-type-'+i),
        link:  val('a-link-'+i),
        media: val('a-media-'+i),
        desc:  val('a-desc-'+i)
      };
    });
    lsSet('armgdn-artists', JSON.stringify(artists));
    flash('artists-note');
  });

  // ── PROJECTS ──
  var projects=[];
  function loadProjects(){
    var raw=lsGet('armgdn-projects');
    projects = raw ? JSON.parse(raw) : [];
    renderProjects();
  }
  function renderProjects(){
    var list=document.getElementById('projects-list');
    list.innerHTML='';
    projects.forEach(function(p,i){
      var card=document.createElement('div');
      card.className='item-card';
      card.innerHTML=
        '<div class="item-card-header">'+
          '<span class="item-card-title">'+(p.title||'PROJECT '+(i+1))+'</span>'+
          '<button class="btn-del" data-idx="'+i+'">REMOVE</button>'+
        '</div>'+
        '<div class="item-card-grid">'+
          field('Project Title','p-title-'+i,p.title||'','text')+
          fieldSel('Category','p-cat-'+i,p.cat||'Mixing',['Mixing','Mastering','Sound Design','Composition','Session','Collaboration','Branding','Other'])+
          field('Client / Artist','p-client-'+i,p.client||'','text')+
          field('Year','p-year-'+i,p.year||'','text')+
          field('Link','p-link-'+i,p.link||'','text')+
          field('Thumbnail URL','p-thumb-'+i,p.thumb||'','text')+
        '</div>'+
        '<div class="form-field"><label>DESCRIPTION</label><textarea class="form-inp" id="p-desc-'+i+'">'+esc(p.desc||'')+'</textarea></div>';
      card.querySelector('.btn-del').addEventListener('click',function(e){
        projects.splice(+e.target.dataset.idx,1); renderProjects();
      });
      list.appendChild(card);
    });
  }
  document.getElementById('project-add').addEventListener('click',function(){
    projects.push({title:'',cat:'Mixing',client:'',year:'2026',link:'',thumb:'',desc:''});
    renderProjects();
  });
  document.getElementById('projects-save').addEventListener('click',function(){
    projects = projects.map(function(_,i){
      return {
        title:  val('p-title-'+i),
        cat:    val('p-cat-'+i),
        client: val('p-client-'+i),
        year:   val('p-year-'+i),
        link:   val('p-link-'+i),
        thumb:  val('p-thumb-'+i),
        desc:   val('p-desc-'+i)
      };
    });
    lsSet('armgdn-projects', JSON.stringify(projects));
    flash('projects-note');
  });

  // ── UTILS ──
  function field(label,id,value,type){
    return '<div class="form-field"><label>'+label+'</label><input class="form-inp" id="'+id+'" type="'+type+'" value="'+esc(value)+'"/></div>';
  }
  function fieldSel(label,id,value,opts){
    var opts_html = opts.map(function(o){
      return '<option value="'+o+'"'+(o===value?' selected':'')+'>'+o+'</option>';
    }).join('');
    return '<div class="form-field"><label>'+label+'</label><select class="form-inp" id="'+id+'">'+opts_html+'</select></div>';
  }
  function val(id){ var el=document.getElementById(id); return el ? el.value : ''; }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function flash(id){ var el=document.getElementById(id); if(!el)return; el.classList.add('show'); setTimeout(function(){ el.classList.remove('show'); },2000); }

  function loadAll(){
    loadSiteCopy();
    loadTools();
    loadArtists();
    loadProjects();
  }

})();
</script>
</body>
</html>
