<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARMGDN Studios</title>
  <meta name="description" content="ARMGDN Studios — art direction and visual design." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300..600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <a href="#main" class="sr-only">Skip to content</a>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="wordmark">ARMGDN</a>
      <nav class="main-nav">
        <a href="/labs/" class="nav-link">Labs</a>
        <a href="/records/" class="nav-link">Records</a>
        <a href="/studios/" class="nav-link" aria-current="page" style="color:var(--text);">Studios</a>
      </nav>
      <button class="theme-toggle" data-theme-toggle aria-label="Switch to light mode">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>
  <main id="main">
    <section class="page-hero">
      <div class="grain"></div>
      <div class="page-hero-inner">
        <p class="page-eyebrow">// ARMGDN Studios</p>
        <h1 class="page-title">Art &amp; Design</h1>
        <p class="page-sub">Art direction, visual identity, and branding for independent artists and labels.</p>
      </div>
    </section>
    <section class="tools-strip" style="border-bottom:none;">
      <div class="strip-inner">
        <p class="strip-label mono">// Work</p>
        <div class="strip-list">
          <div class="strip-row faded">
            <div class="strip-meta">
              <span class="strip-id mono">PROJ_01</span>
              <span class="strip-tag mono">Visual</span>
            </div>
            <span class="strip-name">Portfolio loading</span>
            <span class="strip-status tba">&mdash;</span>
          </div>
        </div>
        <!-- REPLACE: add project rows as work is published -->
      </div>
    </section>
    <footer class="site-footer">
      <div class="footer-inner">
        <span class="footer-wordmark mono">ARMGDN</span>
        <p class="footer-slogan">The Chaos to Create.</p>
        <nav class="footer-nav">
          <a href="/">Home</a>
          <a href="/labs/">Labs</a>
          <a href="/records/">Records</a>
        </nav>
        <p class="footer-copy mono">ARMGDN &copy; 2026</p>
      </div>
    </footer>
  </main>
  <script src="../script.js"></script>
</body>
</html>
